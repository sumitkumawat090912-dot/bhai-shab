<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dental Clinic Premium</title>
<style>
body{font-family:Arial;margin:0;background:#f4f7fb}
header{background:#0a66c2;color:white;padding:15px;text-align:center}
nav{display:flex;justify-content:center;gap:20px;background:#083d77;padding:10px}
nav a{color:white;text-decoration:none}
.hero{padding:60px;text-align:center;background:#e3f2fd}
.btn{background:#0a66c2;color:white;padding:10px 20px;border:none;border-radius:5px}
.section{padding:40px;text-align:center}
.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{background:white;padding:20px;border-radius:10px;width:250px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
form{display:flex;flex-direction:column;gap:10px;width:300px;margin:auto}
input,textarea{padding:10px}
footer{background:#083d77;color:white;text-align:center;padding:10px}
</style>
</head>
<body>
<header>
<h1>Manoj Dental Clinic</h1>
<p>Advanced Dental Care</p>
</header>
<nav>
<a href="#">Home</a>
<a href="#services">Services</a>
<a href="#booking">Booking</a>
<a href="#contact">Contact</a>
</nav>
<section class="hero">
<h2>Healthy Smile Starts Here</h2>
<button class="btn">Book Appointment</button>
</section>
<section id="services" class="section">
<h2>Our Services</h2>
<div class="cards">
<div class="card">Teeth Cleaning</div>
<div class="card">Root Canal</div>
<div class="card">Implants</div>
</div>
</section>
<section id="booking" class="section">
<h2>Book Appointment</h2>
<form>
<input type="text" placeholder="Your Name" required>
<input type="tel" placeholder="Phone Number" required>
<input type="date" required>
<textarea placeholder="Message"></textarea>
<button class="btn">Submit</button>
</form>
</section>
<section id="contact" class="section">
<h2>Contact Us</h2>
<p>Phone: 09314344682</p>
<p>Location: Rd Number 1</p>
</section>
<footer>
<p>© 2026 Dental Clinic</p>
</footer>
</body>
</html>
